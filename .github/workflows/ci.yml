name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --run
      - run: npm run build
      # Deno type-checks for edge-function entry points changed in this
      # turn. Pin Deno to avoid unpinned "latest" drift.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.1.4"
      - run: deno check supabase/functions/generate-single/index.ts
      - run: deno check supabase/functions/generate-single-item-retry/index.ts
